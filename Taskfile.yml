version: "3"

tasks:
  build:
    desc: Build with esbuild
    cmds:
      - nix develop --command pnpm exec esbuild src/index.ts --bundle --platform=node --format=esm --outdir=dist

  dev:
    desc: Run in development mode
    cmds:
      - nix develop --command pnpm exec tsx watch src/index.ts

  lint:
    desc: Run Biome lint
    cmds:
      - nix develop --command pnpm exec biome lint ./src

  fmt:
    desc: Format code with Biome
    cmds:
      - nix develop --command pnpm exec biome format --write ./src

  check:
    desc: Run Biome check and TypeScript type check
    cmds:
      - nix develop --command pnpm exec biome check ./src
      - nix develop --command pnpm exec tsc --noEmit

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist

  hooks:install:
    desc: Install git hooks via lefthook
    cmds:
      - nix develop --command lefthook install

  hooks:run:
    desc: Run pre-commit hooks manually
    cmds:
      - nix develop --command lefthook run pre-commit
